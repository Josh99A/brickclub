name: Deploy to Firebase (production)

# Builds the Flutter web app + Cloud Functions and deploys hosting, functions,
# Firestore rules/indexes and Storage rules whenever main is updated.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: firebase-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Build Flutter web
        run: |
          flutter pub get
          flutter build web --release

      - name: Install & build Cloud Functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        # Pinned: firebase-tools 15.22.2 (published 2026-06-24) intermittently
        # fails service-account auth ("Failed to authenticate") in CI. 15.22.1 is
        # the last version that deployed reliably. Revisit when a fix ships.
        run: npm install -g firebase-tools@15.22.1

      - name: Write service account credentials
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRICKCLUB }}
        run: printf '%s' "$SA" > "${RUNNER_TEMP}/sa.json"

      - name: Write Cloud Functions env (SMTP params)
        env:
          FUNCTIONS_ENV: ${{ secrets.FUNCTIONS_ENV_BRICKCLUB }}
        run: printf '%s' "$FUNCTIONS_ENV" > functions/.env.brickclub

      - name: DEBUG verify sa.json
        run: |
          F="${RUNNER_TEMP}/sa.json"
          echo "byte count: $(wc -c < "$F")"
          echo "first 16 bytes (hex):"; head -c 16 "$F" | xxd
          node -e "const d=JSON.parse(require('fs').readFileSync(process.env.F,'utf8')); console.log('type',d.type); console.log('client_email',d.client_email); console.log('project_id',d.project_id); console.log('private_key_id',d.private_key_id); console.log('pk_head',JSON.stringify(d.private_key.slice(0,32))); console.log('pk_len',d.private_key.length);" || echo "JSON PARSE FAILED"
        env:
          F: ${{ runner.temp }}/sa.json

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          # Force Application Default Credentials to use the service-account file
          # directly instead of probing the (absent) GCE metadata server. That
          # probe races and intermittently surfaced as
          # "Failed to authenticate, have you run firebase login?" in CI.
          METADATA_SERVER_DETECTION: none
        run: |
          # DEBUG branch: firestore-only + --debug to surface the real auth error.
          firebase deploy \
            --only firestore:indexes \
            --project brickclub \
            --non-interactive \
            --force \
            --debug 2>&1 | grep -iE "authenticate|credential|token|requireAuth|invalid_grant|invalid_client|JWT|client_email|deploying|deployed|Error" | tail -40
          exit ${PIPESTATUS[0]}
          for attempt in 1 2 3; do
            echo "::group::Firebase deploy attempt $attempt"
            if firebase deploy \
              --only hosting,functions,firestore,storage \
              --project brickclub \
              --non-interactive \
              --force; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Deploy attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "All deploy attempts failed."
          exit 1
